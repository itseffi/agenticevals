name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Compile sources
        run: python -m compileall -q agenticevals mock_services examples tests
      - name: Public language check
        run: scripts/check-public-language.sh
      - name: Installed CLI smoke
        run: agenticevals verify-install
      - name: Built-in config discovery outside repo
        run: cd /tmp && agenticevals list
      - name: Task smoke
        run: agenticevals run configs/tasks/model-loop-write-file.json
      - name: Suite smoke
        run: agenticevals suite configs/suites/core.json --workers 2
      - name: Data export smoke
        run: |
          set +e
          OUTPUT=$(agenticevals run configs/tasks/patch-python-bug.json --agent noop --json)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          test "$STATUS" -eq 2
          RUN_DIR=$(printf '%s\n' "$OUTPUT" | python -c 'import json,sys; text=sys.stdin.read(); start=text.rfind("{"); print(json.loads(text[start:])["run_dir"])')
          agenticevals export-data "$RUN_DIR" --format rl
          agenticevals export-data "$RUN_DIR" --format preferences
          agenticevals export-dataset "$RUN_DIR"
          agenticevals recompute-rewards "$RUN_DIR"
          agenticevals improve-loop "$RUN_DIR"
      - name: Sandbox HTTP smoke
        run: agenticevals sandbox-smoke --port 18180 --workspace /tmp/agenticevals-sandbox-smoke
      - name: Clean generated bytecode before packaging
        run: |
          find agenticevals configs examples mock_services tests -type d -name __pycache__ -prune -exec rm -rf {} +
          find agenticevals configs examples mock_services tests -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          rm -rf build agenticevals.egg-info
      - name: Build wheel
        run: python -m pip wheel . -w dist
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/agenticevals-wheel
          /tmp/agenticevals-wheel/bin/python -m pip install dist/agenticevals-*.whl
          cd /tmp
          /tmp/agenticevals-wheel/bin/agenticevals verify-install
          /tmp/agenticevals-wheel/bin/agenticevals list
          TASK=$(/tmp/agenticevals-wheel/bin/python -c 'from agenticevals.config import bundled_root; print(bundled_root() / "configs" / "tasks" / "model-loop-write-file.json")')
          /tmp/agenticevals-wheel/bin/agenticevals run "$TASK"
